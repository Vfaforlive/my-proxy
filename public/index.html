<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProxyGate</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080d;
      --surface: #0d0f18;
      --border: #1a1f35;
      --accent: #00e5ff;
      --green: #00ff9d;
      --red: #ff4060;
      --text: #c8d0e8;
      --muted: #4a5070;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .tag {
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #fff; }
    button:disabled { background: var(--muted); cursor: not-allowed; }
    .status {
      font-size: 12px;
      color: var(--muted);
      min-height: 20px;
      transition: color 0.2s;
    }
    .status.loading { color: var(--accent); }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }
    .dot {
      display: inline-block;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
<div class="card">
  <div class="tag">// web proxy</div>
  <h1>Proxy<span>Gate</span></h1>
  <p class="subtitle">Gib eine URL ein — der Server lädt sie für dich</p>

  <label>// Ziel-URL</label>
  <div class="input-row">
    <input id="urlInput" type="text" placeholder="https://example.com" />
    <button id="btn" onclick="goProxy()">GO →</button>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
  function goProxy() {
    let url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    // https:// automatisch hinzufügen falls nicht vorhanden
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }

    const status = document.getElementById('status');
    const btn = document.getElementById('btn');

    status.className = 'status loading';
    status.innerHTML = 'Verbinde mit Server <span class="dot">...</span>';
    btn.disabled = true;

    // Weiterleitung zur echten Proxy-Route auf dem Server
    window.location.href = '/proxy?url=' + encodeURIComponent(url);
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') goProxy();
  });
</script>
</body>
</html>
